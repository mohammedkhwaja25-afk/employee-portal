apiVersion: apps/v1
kind: Deployment

metadata:
  name: employee-portal
  labels:
    app: employee-portal

spec:
  replicas: 2

  selector:
    matchLabels:
      app: employee-portal

  template:
    metadata:
      labels:
        app: employee-portal

    spec:
      containers:
        - name: employee-portal
          image: mohammedkhaja25/employee-portal:latest
          imagePullPolicy: Always

          ports:
            - containerPort: 5000
