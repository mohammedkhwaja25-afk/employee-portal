apiVersion: apps/v1
kind: Deployment
metadata:
  name: employee-portal

spec:
  replicas: 2

  selector:
    matchLabels:
      app: employee-portal

  template:
    metadata:
      labels:
        app: employee-portal

    spec:
      containers:
      - name: employee-portal

        image: employee-portal:v1

        imagePullPolicy: Never

        ports:
        - containerPort: 5000
